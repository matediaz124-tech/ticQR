<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>TICS AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:Arial}
#c{position:relative;width:100vw;height:100vh}
video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}

#scanlines{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;z-index:2;
}

/* Logo 3D spinning container */
#logo-scene{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:72vw;max-width:430px;
  perspective:600px;
  z-index:10;
}

#logo-wrap{
  width:100%;
  transform-style:preserve-3d;
  animation:spin3d 6s ease-in-out infinite, float 3s ease-in-out infinite;
}

#logo-img{
  width:100%;display:block;
  filter:drop-shadow(0 0 18px rgba(0,180,255,0.95)) drop-shadow(0 0 40px rgba(0,120,255,0.7)) drop-shadow(0 0 70px rgba(0,80,255,0.4));
  animation:glow 2.5s ease-in-out infinite;
}

@keyframes spin3d{
  0%   {transform:rotateY(0deg) rotateX(0deg)}
  20%  {transform:rotateY(180deg) rotateX(10deg)}
  40%  {transform:rotateY(360deg) rotateX(0deg)}
  60%  {transform:rotateY(360deg) rotateX(-10deg) rotateZ(5deg)}
  80%  {transform:rotateY(540deg) rotateX(5deg) rotateZ(-5deg)}
  100% {transform:rotateY(720deg) rotateX(0deg) rotateZ(0deg)}
}

@keyframes float{
  0%,100%{margin-top:0px}
  50%{margin-top:-14px}
}

@keyframes glow{
  0%,100%{filter:drop-shadow(0 0 15px rgba(0,180,255,.9)) drop-shadow(0 0 35px rgba(0,120,255,.6)) drop-shadow(0 0 60px rgba(0,80,255,.3))}
  50%{filter:drop-shadow(0 0 28px rgba(0,220,255,1)) drop-shadow(0 0 60px rgba(0,160,255,.9)) drop-shadow(0 0 100px rgba(0,120,255,.6))}
}

/* Shimmer sweep */
#logo-scene::after{
  content:'';
  position:absolute;
  top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(180,240,255,0.15),transparent);
  animation:sweep 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes sweep{
  0%{left:-60%}100%{left:120%}
}

/* AR frame - positioned above the logo */
#frame{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:82vw;max-width:480px;
  height:62vw;max-height:360px;
  border:1.5px solid rgba(0,200,255,0.35);
  border-radius:10px;
  pointer-events:none;
  z-index:15;
}
.corner{position:absolute;width:24px;height:24px;border-color:rgba(0,220,255,0.9);border-style:solid;}
.tl{top:-1px;left:-1px;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.tr{top:-1px;right:-1px;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
.bl{bottom:-1px;left:-1px;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
.br{bottom:-1px;right:-1px;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}

/* Rotating frame border animation */
#frame{
  animation:framePulse 3s ease-in-out infinite;
}
@keyframes framePulse{
  0%,100%{border-color:rgba(0,180,255,0.3);box-shadow:0 0 15px rgba(0,150,255,0.1) inset,0 0 15px rgba(0,150,255,0.05)}
  50%{border-color:rgba(0,230,255,0.7);box-shadow:0 0 30px rgba(0,200,255,0.25) inset,0 0 30px rgba(0,200,255,0.15)}
}

/* Scanning line inside frame */
#scan-line{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:82vw;max-width:480px;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,220,255,0.8),transparent);
  z-index:16;
  pointer-events:none;
  animation:scanMove 2.5s ease-in-out infinite;
}
@keyframes scanMove{
  0%{margin-top:-180px;opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{margin-top:180px;opacity:0}
}

/* AR label inside frame top */
#ar-label{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%, -195px);
  color:rgba(0,220,255,0.85);
  font-size:10px;letter-spacing:3px;
  font-family:monospace;
  z-index:17;pointer-events:none;
  animation:blink 1.8s ease-in-out infinite;
  background:rgba(0,0,0,0.4);
  padding:3px 10px;border-radius:10px;
  border:1px solid rgba(0,200,255,0.3);
  white-space:nowrap;
}
@keyframes blink{0%,100%{opacity:.6}50%{opacity:1}}

/* Particles */
.particle{
  position:absolute;width:3px;height:3px;
  background:rgba(0,200,255,0.8);border-radius:50%;
  pointer-events:none;z-index:4;
  animation:rise linear infinite;
}
@keyframes rise{
  0%{opacity:0;transform:translateY(0) scale(0)}
  10%{opacity:1;transform:translateY(-10px) scale(1)}
  90%{opacity:.4}
  100%{opacity:0;transform:translateY(-130px) scale(0.2)}
}

/* UI Controls */
#btn{position:absolute;bottom:45px;left:50%;transform:translateX(-50%);width:72px;height:72px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.4);font-size:28px;cursor:pointer;z-index:20;box-shadow:0 0 25px rgba(0,180,255,.5)}
#sw{position:absolute;bottom:135px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;border:1px solid rgba(255,255,255,.35);padding:8px 20px;border-radius:20px;cursor:pointer;font-size:12px;z-index:20}
#st{position:absolute;top:22px;left:50%;transform:translateX(-50%);color:rgba(0,220,255,.9);font-size:11px;background:rgba(0,0,0,.55);padding:5px 14px;border-radius:20px;z-index:20;white-space:nowrap;letter-spacing:2px;font-family:monospace;border:1px solid rgba(0,200,255,.3)}
#pm{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pm.show{display:flex}
#pi{max-width:88vw;max-height:68vh;border-radius:10px}
.mb{padding:11px 26px;border-radius:22px;border:none;font-size:15px;font-weight:bold;cursor:pointer}
#bs{background:#0096ff;color:#fff}
#bc{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
#fl{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;opacity:0;pointer-events:none;z-index:50;transition:opacity .08s}
canvas{display:none}
</style>
</head>

  <!-- Marco AR ENCIMA del logo (z-index mayor) -->
  <div id="frame">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
  </div>
  <div id="scan-line"></div>
  <div id="ar-label">● AR ACTIVO</div>

  <div id="fl"></div>
  <div id="st">◈ TICS AR CAMERA</div>
  <button id="sw">🔄 Cambiar cámara</button>
  <button id="btn">📷</button>

  <div id="pm">
    <img id="pi" src="" alt="foto">
    <div style="display:flex;gap:14px">
      <button class="mb" id="bs">💾 Guardar</button>
      <button class="mb" id="bc">✕ Cerrar</button>
    </div>
  </div>
  <canvas id="cv"></canvas>
</div>
<script>
let stream, fm="environment";

function spawnParticles(){
  const cont=document.getElementById("c");
  const scene=document.getElementById("logo-scene");
  const rect=scene.getBoundingClientRect();
  for(let i=0;i<14;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=(rect.left+Math.random()*rect.width)+"px";
    p.style.top=(rect.top+rect.height*0.8+Math.random()*20)+"px";
    p.style.animationDuration=(1.5+Math.random()*2.5)+"s";
    p.style.animationDelay=(Math.random()*2)+"s";
    const sz=(2+Math.random()*3)+"px";
    p.style.width=p.style.height=sz;
    cont.appendChild(p);
    setTimeout(()=>p.remove(),4500);
  }
}
setInterval(spawnParticles,1800);
spawnParticles();

async function start(){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:fm,width:{ideal:1920},height:{ideal:1080}},audio:false});
    document.getElementById("v").srcObject=stream;
    document.getElementById("st").textContent="◈ TICS AR — LISTO";
  }catch(e){document.getElementById("st").textContent="⚠ ACTIVA PERMISOS DE CÁMARA";}
}

document.getElementById("sw").onclick=()=>{fm=fm==="environment"?"user":"environment";start();};

document.getElementById("btn").onclick=()=>{
  const v=document.getElementById("v");
  const logo=document.getElementById("logo-img");
  const scene=document.getElementById("logo-scene");
  const cv=document.getElementById("cv");
  const fl=document.getElementById("fl");
  cv.width=v.videoWidth||1280;
  cv.height=v.videoHeight||720;
  const ctx=cv.getContext("2d");
  if(fm==="user"){ctx.translate(cv.width,0);ctx.scale(-1,1);}
  ctx.drawImage(v,0,0,cv.width,cv.height);
  if(fm==="user")ctx.setTransform(1,0,0,1,0,0);
  const vw=window.innerWidth,vh=window.innerHeight;
  const rect=scene.getBoundingClientRect();
  const sx=cv.width/vw,sy=cv.height/vh;
  ctx.save();
  ctx.filter="blur(18px) brightness(2)";ctx.globalAlpha=0.45;
  ctx.drawImage(logo,rect.left*sx,rect.top*sy,rect.width*sx,rect.height*sy);
  ctx.filter="blur(7px) brightness(1.5)";ctx.globalAlpha=0.65;
  ctx.drawImage(logo,rect.left*sx,rect.top*sy,rect.width*sx,rect.height*sy);
  ctx.filter="none";ctx.globalAlpha=1;
  ctx.drawImage(logo,rect.left*sx,rect.top*sy,rect.width*sx,rect.height*sy);
  ctx.restore();
  fl.style.opacity=".85";
  setTimeout(()=>fl.style.opacity="0",120);
  document.getElementById("pi").src=cv.toDataURL("image/jpeg",.95);
  document.getElementById("pm").classList.add("show");
};

document.getElementById("bs").onclick=()=>{
  const a=document.createElement("a");
  a.href=document.getElementById("pi").src;
  a.download="tics-ar.jpg";a.click();
};
document.getElementById("bc").onclick=()=>document.getElementById("pm").classList.remove("show");
start();
</script>
